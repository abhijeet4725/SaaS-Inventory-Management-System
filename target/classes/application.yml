# =====================================================
# SaaS Inventory + Billing + POS - Application Config
# =====================================================

spring:
  application:
    name: saas-inventory-billing

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        # Multi-tenant configuration
        multiTenancy: DISCRIMINATOR
        tenant_identifier_resolver: com.saasproject.tenant.resolver.TenantIdentifierResolver
        multi_tenant_connection_provider: com.saasproject.tenant.resolver.TenantConnectionProvider

  # Flyway Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson JSON
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

  # Servlet / Security
  servlet:
    context-path: /api

# =====================================================
# OpenAPI / Swagger Configuration
# =====================================================
springdoc:
  api-docs:
    path: /docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: false
  group-configs:
    - group: auth
      paths-to-match: /v1/auth/**
      display-name: Authentication
    - group: inventory
      paths-to-match: /v1/inventory/**
      display-name: Inventory
    - group: invoices
      paths-to-match: /v1/invoices/**
      display-name: Invoices
    - group: pos
      paths-to-match: /v1/pos/**
      display-name: Point of Sale
    - group: users
      paths-to-match: /v1/users/**
      display-name: Users

# =====================================================
# Application Custom Config
# =====================================================
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please-make-it-long}
    access-token-expiration: ${JWT_EXPIRATION:900000}      # 15 minutes
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days
    issuer: ${JWT_ISSUER:saas-inventory-app}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  rate-limit:
    enabled: true
    requests-per-minute: 100
    burst-capacity: 20

  tenant:
    default-tenant: default
    header-name: X-Tenant-ID

# =====================================================
# Actuator / Monitoring
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0

# =====================================================
# Logging Configuration
# =====================================================
logging:
  level:
    root: INFO
    com.saasproject: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# =====================================================
# Development Profile
# =====================================================
spring:
  config:
    activate:
      on-profile: dev

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saas_inventory}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # MongoDB
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/saas_audit}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false

springdoc:
  swagger-ui:
    enabled: true

---
# =====================================================
# Staging Profile
# =====================================================
spring:
  config:
    activate:
      on-profile: staging

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    com.saasproject: INFO
    org.hibernate.SQL: WARN

---
# =====================================================
# Production Profile
# =====================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 30000
      leak-detection-threshold: 60000

  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.saasproject: INFO
    org.hibernate.SQL: ERROR

app:
  cors:
    allowed-origins: ${CORS_ORIGINS}
